<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manhattan — Photorealistic 3D</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js" defer></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #cesiumContainer { width: 100%; height: 100%; }

  /* Hide all Cesium UI chrome — pure cinematic view */
  .cesium-widget-credits,
  .cesium-credit-container,
  .cesium-credit-logoContainer,
  .cesium-credit-textContainer { display: none !important; }

  /* API key overlay — shown until key is entered */
  #keyOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    font-family: 'Courier New', monospace;
    gap: 18px;
  }
  #keyOverlay h2 {
    color: #c9a832;
    font-size: 18px;
    letter-spacing: 0.25em;
    font-weight: 300;
  }
  #keyOverlay p {
    color: rgba(200,180,130,0.6);
    font-size: 12px;
    letter-spacing: 0.1em;
    max-width: 440px;
    text-align: center;
    line-height: 1.8;
  }
  #keyOverlay input {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,160,50,0.4);
    color: #f5e398;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 10px 18px;
    width: 360px;
    outline: none;
    letter-spacing: 0.08em;
  }
  #keyOverlay input::placeholder { color: rgba(200,160,50,0.3); }
  #keyOverlay button {
    background: transparent;
    border: 1px solid rgba(200,160,50,0.6);
    color: #c9a832;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    padding: 10px 32px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #keyOverlay button:hover {
    background: rgba(200,160,50,0.08);
    border-color: rgba(200,160,50,0.9);
  }
  #keyOverlay a {
    color: rgba(200,160,50,0.5);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-decoration: none;
  }
  #keyOverlay a:hover { color: rgba(200,160,50,0.8); }

  /* Status */
  #status {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200,160,50,0.4);
    font: 10px/1 'Courier New', monospace;
    letter-spacing: 0.2em;
    pointer-events: none;
    z-index: 100;
  }

  /* Play/pause */
  #controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    display: none;
    gap: 10px;
  }
  #controls button {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(200,160,50,0.4);
    color: rgba(200,160,50,0.8);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    padding: 8px 16px;
    cursor: pointer;
  }
  #controls button:hover { border-color: rgba(200,160,50,0.8); }
</style>
</head>
<body>

<!-- Keys are hardcoded below — no input needed -->

<div id="cesiumContainer"></div>
<div id="status">INITIALIZING</div>
<div id="controls">
  <button onclick="togglePause()">⏸ PAUSE</button>
  <button onclick="resetFlight()">↺ RESTART</button>
</div>

<script>
// ── FLIGHT PATH ──
// Real GPS coordinates through Manhattan at drone altitude
// Camera moves through actual Midtown streets at ~300-600ft AGL
const FLIGHT_PLAN = [
  // Each waypoint: [longitude, latitude, altitude_meters, heading, pitch, duration_sec]
  // Approach from southeast — full skyline ahead
  { lng: -73.940, lat: 40.730, alt: 800,  hdg: 310, pitch: -12, dur: 8  },
  // Descending toward Midtown, Empire State ahead
  { lng: -73.960, lat: 40.745, alt: 450,  hdg: 295, pitch: -8,  dur: 7  },
  // Entry into Midtown canyon — 34th St corridor
  { lng: -73.978, lat: 40.748, alt: 180,  hdg: 270, pitch: -4,  dur: 6  },
  // Deep in canyon — looking up at Empire State Building
  { lng: -73.983, lat: 40.749, alt: 120,  hdg: 340, pitch: 15,  dur: 5  },
  // Banking north up 5th Avenue — towers on both sides
  { lng: -73.984, lat: 40.752, alt: 150,  hdg: 5,   pitch: -2,  dur: 6  },
  // Mid-block Midtown — tight between skyscrapers
  { lng: -73.981, lat: 40.758, alt: 110,  hdg: 350, pitch: 8,   dur: 5  },
  // Rising — reveal of full skyline looking south
  { lng: -73.979, lat: 40.762, alt: 280,  hdg: 175, pitch: -15, dur: 6  },
  // Banking west — Hudson River view, city to the right
  { lng: -73.972, lat: 40.760, alt: 350,  hdg: 250, pitch: -10, dur: 6  },
  // Sweeping south past Columbus Circle
  { lng: -73.981, lat: 40.768, alt: 220,  hdg: 200, pitch: -5,  dur: 5  },
  // Low over Central Park South — skyscrapers lining the south edge
  { lng: -73.975, lat: 40.765, alt: 140,  hdg: 110, pitch: 5,   dur: 5  },
  // Dive toward Bryant Park — midtown canyon ahead
  { lng: -73.983, lat: 40.754, alt: 100,  hdg: 290, pitch: 2,   dur: 5  },
  // Looking up at One Vanderbilt / Grand Central cluster
  { lng: -73.978, lat: 40.752, alt: 90,   hdg: 320, pitch: 20,  dur: 5  },
  // Pull back to high aerial — full Manhattan island
  { lng: -73.960, lat: 40.750, alt: 900,  hdg: 290, pitch: -20, dur: 8  },
  // Loop back to start
  { lng: -73.940, lat: 40.730, alt: 800,  hdg: 310, pitch: -12, dur: 6  },
];

let viewer = null;
let flying = false;
let paused = false;
let flightStart = 0;
let flightTotal = 0;
let animFrame = null;

// Precompute total duration
FLIGHT_PLAN.forEach(wp => flightTotal += wp.dur);

async function startFlight() {
  document.getElementById('status').textContent = 'FETCHING KEYS...';

  // Keys served from Cloudflare worker — never stored in HTML or GitHub
  let token = '', googleKey = '';
  try {
    const res = await fetch('https://caci-worker.timtkosuge.workers.dev/api/map-keys');
    if (res.ok) {
      const keys = await res.json();
      token     = keys.cesiumToken  || '';
      googleKey = keys.googleKey    || '';
    } else {
      document.getElementById('status').textContent = 'KEY FETCH FAILED — check worker';
      return;
    }
  } catch (e) {
    document.getElementById('status').textContent = 'KEY FETCH ERROR: ' + e.message;
    return;
  }

  if (!token) {
    document.getElementById('status').textContent = 'NO CESIUM TOKEN — add to Cloudflare env vars';
    return;
  }

  document.getElementById('status').textContent = 'LOADING TILES...';

  // Set Cesium token
  Cesium.Ion.defaultAccessToken = token;

  // Initialize Cesium viewer — stripped down for cinematic mode
  viewer = new Cesium.Viewer('cesiumContainer', {
    // No imagery by default — will use Google 3D tiles
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    animation: false,
    timeline: false,
    fullscreenButton: false,
    infoBox: false,
    selectionIndicator: false,
    shadows: false,
    // High quality rendering
    requestRenderMode: false,
    targetFrameRate: 60,
  });

  // ── ATMOSPHERE & LIGHTING ──
  // Set time to night — 10pm NYC local
  const now = Cesium.JulianDate.now();
  // Offset to approximately 10pm ET (UTC-4 in summer)
  const nightTime = Cesium.JulianDate.addHours(now, -4, new Cesium.JulianDate());
  // Find a time when NYC is in darkness — set to 2am UTC (10pm ET)
  const date = new Date();
  date.setUTCHours(2, 0, 0, 0);
  viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);
  viewer.clock.shouldAnimate = false; // freeze time — no sun movement

  // Atmosphere settings for dramatic night sky
  viewer.scene.skyAtmosphere.show = true;
  viewer.scene.skyAtmosphere.hueShift = 0.0;
  viewer.scene.skyAtmosphere.saturationShift = 0.1;
  viewer.scene.skyAtmosphere.brightnessShift = -0.3;

  // Stars
  viewer.scene.skyBox.show = true;

  // Fog — subtle atmospheric haze
  viewer.scene.fog.enabled = true;
  viewer.scene.fog.density = 0.0002;
  viewer.scene.fog.minimumBrightness = 0.05;

  // High quality anti-aliasing
  viewer.scene.postProcessStages.fxaa.enabled = true;

  // ── GOOGLE PHOTOREALISTIC 3D TILES ──
  async function loadTiles() {
    try {
      let tileset;

      if (googleKey) {
        // Google Maps Photorealistic 3D Tiles — real building textures
        tileset = await Cesium.Cesium3DTileset.fromUrl(
          `https://tile.googleapis.com/v1/3dtiles/root.json?key=${googleKey}`,
          {
            showCreditsOnScreen: false,
          }
        );
        document.getElementById('status').textContent = 'GOOGLE 3D TILES LOADED';
      } else {
        // Fallback: Cesium OSM Buildings — still 3D but no photo textures
        tileset = await Cesium.createOsmBuildingsAsync();
        document.getElementById('status').textContent = 'OSM BUILDINGS LOADED (add Google key for photo textures)';
      }

      viewer.scene.primitives.add(tileset);

      // Start flight after tiles load
      setTimeout(() => {
        document.getElementById('status').textContent = 'MANHATTAN · DRONE FLIGHT';
        document.getElementById('controls').style.display = 'flex';
        beginFlight();
      }, 2000);

    } catch (err) {
      console.error('Tile load error:', err);
      document.getElementById('status').textContent = 'TILE ERROR — check API key. Loading OSM fallback...';
      // Fallback to OSM
      try {
        const osm = await Cesium.createOsmBuildingsAsync();
        viewer.scene.primitives.add(osm);
        setTimeout(beginFlight, 1500);
      } catch(e) {
        document.getElementById('status').textContent = 'ERROR: ' + e.message;
      }
    }
  }

  loadTiles();
}

function beginFlight() {
  flying = true;
  paused = false;
  flightStart = performance.now();
  flyFrame();
}

function togglePause() {
  paused = !paused;
  document.querySelector('#controls button').textContent = paused ? '▶ PLAY' : '⏸ PAUSE';
  if (!paused) {
    // Adjust start time to account for pause
    flightStart = performance.now() - pausedAt;
    flyFrame();
  } else {
    pausedAt = performance.now() - flightStart;
    if (animFrame) cancelAnimationFrame(animFrame);
  }
}

function resetFlight() {
  paused = false;
  document.querySelector('#controls button').textContent = '⏸ PAUSE';
  beginFlight();
}

let pausedAt = 0;

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1 + (4 - 2*t) * t;
}

function flyFrame() {
  if (!flying || paused) return;

  const elapsed = (performance.now() - flightStart) / 1000;
  const loopT = elapsed % flightTotal;

  // Find current segment
  let segStart = 0;
  let segIdx = 0;
  for (let i = 0; i < FLIGHT_PLAN.length; i++) {
    const wp = FLIGHT_PLAN[i];
    if (loopT < segStart + wp.dur) {
      segIdx = i;
      break;
    }
    segStart += wp.dur;
  }

  const wpA = FLIGHT_PLAN[segIdx];
  const wpB = FLIGHT_PLAN[(segIdx + 1) % FLIGHT_PLAN.length];
  const segT = easeInOut(Math.max(0, Math.min(1, (loopT - segStart) / wpA.dur)));

  // Interpolate position
  const lng = wpA.lng + (wpB.lng - wpA.lng) * segT;
  const lat = wpA.lat + (wpB.lat - wpA.lat) * segT;
  const alt = wpA.alt + (wpB.alt - wpA.alt) * segT;
  const hdg = wpA.hdg + (wpB.hdg - wpA.hdg) * segT;
  const pitch = wpA.pitch + (wpB.pitch - wpA.pitch) * segT;

  // Add subtle organic camera movement — drone micro-jitter
  const t = elapsed;
  const microLng = Math.sin(t * 0.7) * 0.00008 + Math.sin(t * 1.3) * 0.00004;
  const microLat = Math.cos(t * 0.8) * 0.00006 + Math.cos(t * 1.5) * 0.00003;
  const microHdg = Math.sin(t * 0.4) * 1.2 + Math.sin(t * 0.9) * 0.6;
  const microPitch = Math.sin(t * 0.5) * 0.8;
  const microRoll = Math.sin(t * 0.6) * 0.4;

  // Apply camera
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(
      lng + microLng,
      lat + microLat,
      alt
    ),
    orientation: {
      heading: Cesium.Math.toRadians(hdg + microHdg),
      pitch: Cesium.Math.toRadians(pitch + microPitch),
      roll: Cesium.Math.toRadians(microRoll),
    }
  });

  // Update status
  const pct = Math.floor((loopT / flightTotal) * 100);
  const locations = [
    'APPROACHING MIDTOWN', 'DESCENDING TO MANHATTAN', 'ENTERING 34TH ST CORRIDOR',
    'EMPIRE STATE DISTRICT', '5TH AVENUE CANYON', 'MIDTOWN TOWERS',
    'SKYLINE REVEAL', 'HUDSON RIVER VIEW', 'COLUMBUS CIRCLE',
    'CENTRAL PARK SOUTH', 'BRYANT PARK APPROACH', 'GRAND CENTRAL CLUSTER',
    'AERIAL PULLBACK', 'LOOPING'
  ];
  document.getElementById('status').textContent =
    `${locations[segIdx] || 'MANHATTAN'} · ${Math.floor(alt)}m AGL`;

  animFrame = requestAnimationFrame(flyFrame);
}

// Handle resize
window.addEventListener('resize', () => {
  if (viewer) viewer.resize();
});

// Keyboard shortcuts
window.addEventListener('keydown', e => {
  if (e.key === ' ') togglePause();
  if (e.key === 'r' || e.key === 'R') resetFlight();
});

// Auto-start — wait for Cesium to fully initialize
function waitForCesium() {
  if (typeof Cesium !== 'undefined' && Cesium.Viewer) {
    startFlight();
  } else {
    setTimeout(waitForCesium, 100);
  }
}
window.addEventListener('load', waitForCesium);
</script>
</body>
</html>
