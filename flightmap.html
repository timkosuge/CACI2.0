<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KAIT Flight Path Map</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a12; color:#c9a832; font-family:'Courier New',monospace; display:flex; height:100vh; overflow:hidden; }

#map-container { flex:1; position:relative; }
canvas { position:absolute; top:0; left:0; cursor:crosshair; }

#sidebar { width:260px; background:#050508; border-left:1px solid rgba(200,160,50,0.15); display:flex; flex-direction:column; }
#sidebar-header { padding:12px 14px; border-bottom:1px solid rgba(200,160,50,0.1); }
#sidebar-header h2 { font-size:10px; letter-spacing:0.4em; color:rgba(200,160,50,0.45); }
#sidebar-header p { font-size:9px; color:rgba(200,160,50,0.25); margin-top:4px; letter-spacing:0.1em; }

#view-tabs { display:flex; border-bottom:1px solid rgba(200,160,50,0.1); }
.tab { flex:1; padding:7px; font-size:9px; letter-spacing:0.15em; text-align:center; cursor:pointer; color:rgba(200,160,50,0.35); border:none; background:none; transition:all 0.15s; }
.tab.active { color:#c9a832; background:rgba(200,160,50,0.06); border-bottom:1px solid #c9a832; }

#wp-list { flex:1; overflow-y:auto; }
#wp-list::-webkit-scrollbar { width:3px; }
#wp-list::-webkit-scrollbar-thumb { background:rgba(200,160,50,0.2); }

.wp-item { padding:7px 12px; cursor:pointer; border-bottom:1px solid rgba(200,160,50,0.06); transition:all 0.12s; }
.wp-item:hover { background:rgba(200,160,50,0.05); }
.wp-item.active { background:rgba(200,160,50,0.1); border-left:2px solid #c9a832; }
.wp-row { display:flex; align-items:center; gap:6px; }
.wp-num { font-size:9px; color:rgba(200,160,50,0.3); width:18px; flex-shrink:0; }
.wp-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.wp-name { font-size:10px; color:rgba(200,160,50,0.85); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wp-meta { font-size:8px; color:rgba(200,160,50,0.3); margin-top:2px; padding-left:32px; }

#detail-panel { padding:14px; border-top:1px solid rgba(200,160,50,0.1); }
#detail-panel h3 { font-size:9px; letter-spacing:0.3em; color:rgba(200,160,50,0.35); margin-bottom:10px; }
.stat { display:flex; justify-content:space-between; margin:5px 0; font-size:10px; }
.stat-label { color:rgba(200,160,50,0.35); }
.stat-val { color:#c9a832; }
.pitch-bar { height:2px; background:rgba(200,160,50,0.1); margin:6px 0; position:relative; }
.pitch-fill { position:absolute; height:100%; background:#c9a832; top:0; }

#zoom-btns { position:absolute; bottom:14px; left:14px; display:flex; flex-direction:column; gap:4px; }
.zoom-btn { width:28px; height:28px; background:rgba(0,0,4,0.8); border:1px solid rgba(200,160,50,0.25); color:rgba(200,160,50,0.7); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.zoom-btn:hover { border-color:#c9a832; color:#c9a832; }

#map-legend { position:absolute; top:12px; left:12px; font-size:8px; color:rgba(200,160,50,0.5); letter-spacing:0.1em; }
.leg-row { display:flex; align-items:center; gap:6px; margin:3px 0; }
.leg-dot { width:8px; height:8px; border-radius:50%; }
</style>
</head>
<body>
<div id="map-container">
  <canvas id="c"></canvas>
  <div id="map-legend">
    <div class="leg-row"><div class="leg-dot" style="background:rgba(100,200,255,0.9)"></div> &lt;30m street level</div>
    <div class="leg-row"><div class="leg-dot" style="background:rgba(200,160,50,0.9)"></div> 30–80m</div>
    <div class="leg-row"><div class="leg-dot" style="background:rgba(255,140,50,0.9)"></div> 80–200m</div>
    <div class="leg-row"><div class="leg-dot" style="background:rgba(255,80,80,0.9)"></div> &gt;200m aerial</div>
    <div class="leg-row" style="margin-top:6px"><div style="width:8px;height:2px;background:rgba(200,160,50,0.4)"></div> camera direction</div>
  </div>
  <div id="zoom-btns">
    <button class="zoom-btn" onclick="zoom(1.3)">+</button>
    <button class="zoom-btn" onclick="zoom(0.77)">−</button>
    <button class="zoom-btn" onclick="resetView()" style="font-size:9px;letter-spacing:0">FIT</button>
  </div>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <h2>KAIT · FLIGHT PATH</h2>
    <p id="total-info"></p>
  </div>
  <div id="view-tabs">
    <button class="tab active" onclick="setTab('all')">ALL</button>
    <button class="tab" onclick="setTab('manhattan')">MANHATTAN</button>
    <button class="tab" onclick="setTab('harbor')">HARBOR</button>
  </div>
  <div id="wp-list"></div>
  <div id="detail-panel">
    <h3>WAYPOINT DETAIL</h3>
    <div id="det"></div>
  </div>
</div>

  {lng:-74.01555,lat:40.73829,alt:20,hdg:180.0,pitch:-0.4,dur:14,label:'WEST ST HEADING SOUTH',ch:'MANHATTAN'},
  {lng:-74.007,lat:40.758,alt:280,hdg:121.9,pitch:-7.8,dur:16,label:'FAREWELL MANHATTAN',ch:'NJ'},
  {lng:-74.013,lat:40.76,alt:10,hdg:282.5,pitch:-0.6,dur:14,label:'HUDSON RIVER CROSSING',ch:'NJ'},
  {lng:-74.022,lat:40.768,alt:55,hdg:126.7,pitch:-0.1,dur:16,label:'WEEHAWKEN · NJ',ch:'NJ'},
  {lng:-74.025,lat:40.8,alt:65,hdg:0.0,pitch:-1.7,dur:12,label:'NJ TURNPIKE NORTH',ch:'NJ'},
  {lng:-74.032,lat:40.84,alt:22,hdg:355.7,pitch:-1.1,dur:12,label:'US ROUTE 46',ch:'NJ'},
  {lng:-74.033,lat:40.847,alt:12,hdg:303.5,pitch:-9.9,dur:12,label:'415 US-46',ch:'NJ'},
  {lng:-74.033,lat:40.852,alt:60,hdg:183.6,pitch:-5.9,dur:16,label:'BEYOND HELLO · LITTLE FERRY',ch:'NJ'},
  {lng:-74.033,lat:40.845,alt:220,hdg:162.8,pitch:-0.8,dur:18,label:'THE JOURNEY COMPLETE',ch:'NJ'},

const LANDMARKS = [
  {lng:-74.04456,lat:40.68924,name:'STATUE',color:'#4af'},
  {lng:-74.0134,lat:40.7127,name:'1WTC',color:'#fa4'},
  {lng:-73.9857,lat:40.7484,name:'ESB',color:'#fa4'},
  {lng:-73.9856,lat:40.758,name:'TIMES SQ',color:'#f84'},
  {lng:-73.9742,lat:40.7762,name:'BOW BRIDGE',color:'#4f8'},
  {lng:-74.0334,lat:40.8472,name:'BEYOND HELLO',color:'#4f8'},
];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let selectedIdx = -1;
let currentTab = 'all';

// View state
let viewCx = -74.02, viewCy = 40.74, viewScale = 1;

function getBounds(tab) {
  if (tab === 'manhattan') return {minLng:-74.025,maxLng:-73.960,minLat:40.695,maxLat:40.795};
  if (tab === 'harbor')    return {minLng:-74.075,maxLng:-73.990,minLat:40.655,maxLat:40.720};
  return {minLng:-74.070,maxLng:-73.955,minLat:40.655,maxLat:40.860};
}

let bounds = getBounds('all');

function project(lng, lat) {
  const x = (lng - bounds.minLng) / (bounds.maxLng - bounds.minLng) * W;
  const y = (1 - (lat - bounds.minLat) / (bounds.maxLat - bounds.minLat)) * H;
  return [x, y];
}

function unproject(x, y) {
  const lng = x / W * (bounds.maxLng - bounds.minLng) + bounds.minLng;
  const lat = (1 - y / H) * (bounds.maxLat - bounds.minLat) + bounds.minLat;
  return [lng, lat];
}

function altColor(alt) {
  if (alt < 30)  return 'rgba(100,200,255,0.95)';
  if (alt < 80)  return 'rgba(200,160,50,0.95)';
  if (alt < 200) return 'rgba(255,140,50,0.95)';
  return 'rgba(255,80,80,0.95)';
}

function draw() {
  W = canvas.width  = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
  ctx.clearRect(0,0,W,H);

  // Grid lines (lat/lng)
  ctx.strokeStyle = 'rgba(200,160,50,0.05)';
  ctx.lineWidth = 1;
  for (let lng = -74.07; lng < -73.95; lng += 0.01) {
    const [x] = project(lng, bounds.minLat);
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let lat = 40.66; lat < 40.87; lat += 0.01) {
    const [,y] = project(bounds.minLng, lat);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Path — dashed background
  ctx.beginPath();
  ctx.setLineDash([3,5]);
  ctx.strokeStyle = 'rgba(200,160,50,0.12)';
  ctx.lineWidth = 1;
  WP.forEach((wp,i) => {
    const [x,y] = project(wp.lng, wp.lat);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.setLineDash([]);

  // Path — colored segments
  for (let i = 0; i < WP.length-1; i++) {
    const a = WP[i], b = WP[i+1];
    const [ax,ay] = project(a.lng,a.lat);
    const [bx,by] = project(b.lng,b.lat);
    const grad = ctx.createLinearGradient(ax,ay,bx,by);
    grad.addColorStop(0, altColor(a.alt));
    grad.addColorStop(1, altColor(b.alt));
    ctx.beginPath();
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2.5;
    ctx.moveTo(ax,ay); ctx.lineTo(bx,by);
    ctx.stroke();
  }

  // Camera direction arrows
  WP.forEach((wp,i) => {
    const [x,y] = project(wp.lng,wp.lat);
    const len = 12;
    const rad = (wp.hdg-90)*Math.PI/180;
    ctx.beginPath();
    ctx.strokeStyle = i===selectedIdx ? 'rgba(255,255,200,0.8)' : 'rgba(200,160,50,0.35)';
    ctx.lineWidth = i===selectedIdx ? 2 : 1;
    ctx.moveTo(x,y);
    const ex = x+Math.cos(rad)*len, ey = y+Math.sin(rad)*len;
    ctx.lineTo(ex,ey);
    ctx.stroke();
    // Arrowhead
    ctx.beginPath();
    ctx.fillStyle = i===selectedIdx ? 'rgba(255,255,200,0.8)' : 'rgba(200,160,50,0.5)';
    const arad = rad + Math.PI*0.8;
    const brad = rad - Math.PI*0.8;
    ctx.moveTo(ex,ey);
    ctx.lineTo(ex+Math.cos(arad)*4, ey+Math.sin(arad)*4);
    ctx.lineTo(ex+Math.cos(brad)*4, ey+Math.sin(brad)*4);
    ctx.closePath(); ctx.fill();
  });

  // Landmarks
  LANDMARKS.forEach(lm => {
    const [x,y] = project(lm.lng,lm.lat);
    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle = lm.color+'55';
    ctx.strokeStyle = lm.color;
    ctx.lineWidth=1;
    ctx.fill(); ctx.stroke();
    ctx.fillStyle=lm.color;
    ctx.font='8px Courier New';
    ctx.fillText(lm.name,x+5,y+3);
  });

  // Waypoint dots
  WP.forEach((wp,i) => {
    const [x,y] = project(wp.lng,wp.lat);
    const sel = i===selectedIdx;
    const r = sel ? 8 : 5;
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = sel ? '#c9a832' : altColor(wp.alt);
    ctx.fill();
    if(sel){ ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
    ctx.fillStyle = sel?'#000':'rgba(0,0,0,0.85)';
    ctx.font=`bold ${sel?9:7}px Courier New`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(i+1, x, y);
    ctx.textAlign='left';
    // Label for selected or named
    if(sel && wp.label){
      ctx.fillStyle='rgba(200,160,50,0.9)';
      ctx.font='9px Courier New';
      ctx.fillText(wp.label, x+10, y-8);
    }
  });
}

function buildList() {
  const list = document.getElementById('wp-list');
  list.innerHTML = '';
  WP.forEach((wp,i) => {
    if(currentTab==='manhattan' && wp.ch!=='MANHATTAN') return;
    if(currentTab==='harbor' && wp.ch!=='HARBOR') return;
    const div = document.createElement('div');
    div.className='wp-item'+(i===selectedIdx?' active':'');
    div.innerHTML=`
      <div class="wp-row">
        <span class="wp-num">${String(i+1).padStart(2,'0')}</span>
        <div class="wp-dot" style="background:${altColor(wp.alt)}"></div>
        <span class="wp-name">${wp.label||'—'}</span>
      </div>
      <div class="wp-meta">alt:${wp.alt}m · hdg:${wp.hdg}° · pitch:${wp.pitch}° · ${wp.dur}s</div>`;
    div.onclick=()=>{ selectedIdx=i; buildList(); draw(); showDetail(wp,i); list.querySelectorAll('.wp-item')[Array.from(list.querySelectorAll('.wp-item')).indexOf(div)].scrollIntoView({block:'nearest'}); };
    list.appendChild(div);
  });

  const total=WP.reduce((s,w)=>s+w.dur,0);
  document.getElementById('total-info').textContent=`${WP.length} waypoints · ${total}s · ${(total/60).toFixed(1)}min`;
}

function showDetail(wp,i) {
  const pitchPct = ((wp.pitch+90)/180*100).toFixed(0);
  document.getElementById('det').innerHTML=`
    <div class="stat"><span class="stat-label">WP</span><span class="stat-val">#${i+1} of ${WP.length}</span></div>
    <div class="stat"><span class="stat-label">LABEL</span><span class="stat-val" style="font-size:9px">${wp.label||'—'}</span></div>
    <div class="stat"><span class="stat-label">LNG</span><span class="stat-val">${wp.lng}</span></div>
    <div class="stat"><span class="stat-label">LAT</span><span class="stat-val">${wp.lat}</span></div>
    <div class="stat"><span class="stat-label">ALTITUDE</span><span class="stat-val">${wp.alt}m</span></div>
    <div class="stat"><span class="stat-label">CAM HEADING</span><span class="stat-val">${wp.hdg}°</span></div>
    <div class="stat"><span class="stat-label">CAM PITCH</span><span class="stat-val">${wp.pitch}° ${wp.pitch>0?'↑ (looking up)':wp.pitch<-20?'↓↓ (steep down)':'↓ (slight down)'}</span></div>
    <div class="pitch-bar"><div class="pitch-fill" style="left:${Math.min(pitchPct,100)}%;width:3px;background:${wp.pitch>5?'#4af':wp.pitch<-15?'#f84':'#c9a832'}"></div></div>
    <div class="stat"><span class="stat-label">DURATION</span><span class="stat-val">${wp.dur}s</span></div>
    <div class="stat"><span class="stat-label">SECTION</span><span class="stat-val">${wp.ch}</span></div>`;
}

function setTab(tab) {
  currentTab = tab;
  bounds = getBounds(tab);
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['all','manhattan','harbor'][i]===tab));
  buildList(); draw();
}

function zoom(f) {
  const cx = (bounds.minLng+bounds.maxLng)/2;
  const cy = (bounds.minLat+bounds.maxLat)/2;
  const wLng = (bounds.maxLng-bounds.minLng)/f;
  const wLat = (bounds.maxLat-bounds.minLat)/f;
  bounds = {minLng:cx-wLng/2,maxLng:cx+wLng/2,minLat:cy-wLat/2,maxLat:cy+wLat/2};
  draw();
}

function resetView() { bounds=getBounds(currentTab); draw(); }

canvas.addEventListener('click', e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  let best=-1, bestD=16;
  WP.forEach((wp,i)=>{
    const [x,y]=project(wp.lng,wp.lat);
    const d=Math.sqrt((x-mx)**2+(y-my)**2);
    if(d<bestD){bestD=d;best=i;}
  });
  if(best>=0){
    selectedIdx=best;
    buildList();
    draw();
    showDetail(WP[best],best);
    const items=document.querySelectorAll('.wp-item');
    const visibleItems=[...items].filter(el=>el.offsetParent!==null);
    if(visibleItems[best]) visibleItems[best].scrollIntoView({block:'nearest'});
  }
});

window.addEventListener('resize',()=>draw());
