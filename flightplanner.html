<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KAIT Flight Planner</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- Cesium loaded lazily when 3D preview is first opened -->
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#060610; color:#c9a832; font-family:'Courier New',monospace; }

/* ══ LAYOUT ══ */
#app { display:flex; flex-direction:column; height:100vh; }
#top { display:flex; flex:1; min-height:0; }
#map-wrap { flex:1; position:relative; }
#map { width:100%; height:100%; filter:invert(1) hue-rotate(180deg) brightness(0.8) contrast(1.1) saturate(0.55); }
#cesium-wrap {
  position:absolute; inset:0; display:none; flex-direction:column; z-index:100;
  background:#000;
}
#cesium-wrap.open { display:flex; }
#cesiumContainer { flex:1; min-height:0; width:100%; }
.cesium-widget, .cesium-widget canvas { width:100% !important; height:100% !important; }

/* ══ RIGHT PANEL ══ */
#rpanel {
  width:280px; background:#07070f; border-left:1px solid rgba(200,160,50,0.15);
  display:flex; flex-direction:column; flex-shrink:0;
}
#rp-header { padding:10px 12px 8px; border-bottom:1px solid rgba(200,160,50,0.1); }
#rp-header h1 { font-size:9px; letter-spacing:0.45em; color:#c9a832; }
#rp-tabs { display:flex; border-bottom:1px solid rgba(200,160,50,0.1); }
.rtab { flex:1; padding:7px 2px; font-size:8px; letter-spacing:0.08em; text-align:center;
  cursor:pointer; color:rgba(200,160,50,0.3); background:none; border:none;
  border-bottom:2px solid transparent; transition:all 0.15s; }
.rtab.on { color:#c9a832; border-bottom-color:#c9a832; background:rgba(200,160,50,0.05); }

#wp-list { flex:1; overflow-y:auto; min-height:0; }
#wp-list::-webkit-scrollbar { width:2px; }
#wp-list::-webkit-scrollbar-thumb { background:rgba(200,160,50,0.2); }
.wrow { padding:5px 10px; border-bottom:1px solid rgba(200,160,50,0.05);
  cursor:pointer; transition:background 0.1s; }
.wrow:hover { background:rgba(200,160,50,0.04); }
.wrow.sel { background:rgba(200,160,50,0.08); border-left:2px solid #c9a832; }
.wr1 { display:flex; align-items:center; gap:5px; }
.wnum { font-size:8px; color:rgba(200,160,50,0.3); width:14px; }
.wdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.wname { flex:1; font-size:9px; color:rgba(200,160,50,0.8); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.wdel { color:rgba(255,80,80,0.4); cursor:pointer; font-size:10px; padding:0 2px; }
.wdel:hover { color:rgba(255,80,80,0.9); }
.wr2 { font-size:7px; color:rgba(200,160,50,0.3); padding-left:19px; margin-top:2px; display:flex; gap:8px; }
.wtag { font-size:7px; color:rgba(100,200,255,0.5); padding:1px 4px; border:1px solid rgba(100,200,255,0.15); cursor:pointer; transition:all 0.12s; display:inline-block; margin-top:2px; margin-left:19px; }
.wtag:hover { color:rgba(100,200,255,1); border-color:rgba(100,200,255,0.5); }
.wtag.or { color:rgba(255,160,50,0.6); border-color:rgba(255,160,50,0.2); }
.wtag.or:hover { color:rgba(255,160,50,1); border-color:rgba(255,160,50,0.6); }
.wtag.gr { color:rgba(100,255,150,0.6); border-color:rgba(100,255,150,0.2); }
.wtag.gr:hover { color:rgba(100,255,150,1); border-color:rgba(100,255,150,0.5); }

#rp-stats { padding:6px 12px; font-size:8px; color:rgba(200,160,50,0.3);
  border-top:1px solid rgba(200,160,50,0.08); letter-spacing:0.08em; }
#rp-btns { padding:8px 10px; border-top:1px solid rgba(200,160,50,0.1); display:flex; flex-direction:column; gap:5px; }
.rb { padding:7px; font-size:8px; letter-spacing:0.12em; text-align:center;
  border:1px solid rgba(200,160,50,0.2); background:rgba(200,160,50,0.04);
  color:rgba(200,160,50,0.7); cursor:pointer; transition:all 0.15s; }
.rb:hover { border-color:#c9a832; color:#c9a832; background:rgba(200,160,50,0.09); }
.rb.bl { border-color:rgba(100,180,255,0.2); color:rgba(100,180,255,0.7); }
.rb.bl:hover { border-color:rgba(100,180,255,0.7); color:#80c8ff; background:rgba(100,180,255,0.07); }
.rb.gn { border-color:rgba(100,255,150,0.2); color:rgba(100,255,150,0.7); }
.rb.gn:hover { border-color:rgba(100,255,150,0.7); color:#80ffaa; background:rgba(100,255,150,0.07); }
.rb-row { display:flex; gap:5px; }
.rb-row .rb { flex:1; }

/* ══ BOTTOM DASHBOARD ══ */
#dashboard {
  height:160px; background:#04040e; border-top:1px solid rgba(200,160,50,0.2);
  display:flex; flex-shrink:0;
}

/* Left: 3D Controls */
#ctrl-pad {
  width:340px; border-right:1px solid rgba(200,160,50,0.12);
  padding:10px 12px; display:flex; flex-direction:column; gap:6px; flex-shrink:0;
}
#ctrl-pad-title { font-size:8px; letter-spacing:0.3em; color:rgba(200,160,50,0.4); margin-bottom:2px; }
.ctrl-cluster { display:flex; gap:8px; align-items:center; }
.ctrl-group { display:flex; flex-direction:column; gap:3px; }
.ctrl-row { display:flex; gap:3px; justify-content:center; }
.ckey {
  width:32px; height:28px; background:rgba(200,160,50,0.06);
  border:1px solid rgba(200,160,50,0.2); color:rgba(200,160,50,0.7);
  font:8px 'Courier New',monospace; display:flex; flex-direction:column;
  align-items:center; justify-content:center; cursor:pointer; transition:all 0.1s;
  user-select:none; letter-spacing:0.05em; line-height:1.2;
}
.ckey:hover { background:rgba(200,160,50,0.12); border-color:#c9a832; color:#c9a832; }
.ckey.active { background:rgba(200,160,50,0.2); border-color:#c9a832; color:#fff; }
.ckey.wide { width:52px; }
.ckey.blue { border-color:rgba(100,200,255,0.25); color:rgba(100,200,255,0.7); background:rgba(100,200,255,0.04); }
.ckey.blue:hover { border-color:rgba(100,200,255,0.7); color:#80c8ff; background:rgba(100,200,255,0.1); }
.ckey.blue.active { background:rgba(100,200,255,0.2); }
.ckey.green { border-color:rgba(100,255,150,0.25); color:rgba(100,255,150,0.7); background:rgba(100,255,150,0.04); }
.ckey.green:hover { border-color:rgba(100,255,150,0.7); color:#80ffaa; }
.ckey.red { border-color:rgba(255,80,80,0.25); color:rgba(255,100,100,0.7); }
.ckey.red:hover { border-color:rgba(255,80,80,0.7); color:#ff8080; }
.ckey-label { font-size:6px; color:rgba(200,160,50,0.35); margin-top:1px; }
.ctrl-sep { width:1px; background:rgba(200,160,50,0.08); align-self:stretch; margin:0 4px; }
.ctrl-info { font-size:7px; color:rgba(200,160,50,0.3); line-height:2; letter-spacing:0.05em; }

/* Middle: Status + Timeline */
#center-dash { flex:1; padding:10px 14px; display:flex; flex-direction:column; gap:6px; }
#cesium-status-bar { font-size:9px; color:rgba(200,160,50,0.5); letter-spacing:0.1em; min-height:14px; }
#timeline { flex:1; background:rgba(200,160,50,0.03); border:1px solid rgba(200,160,50,0.1); position:relative; cursor:pointer; }
#timeline-fill { height:100%; background:rgba(200,160,50,0.15); width:0%; transition:width 0.2s; }
#timeline-marker { position:absolute; top:0; bottom:0; width:2px; background:#c9a832; left:0%; transition:left 0.2s; }
.tl-labels { display:flex; justify-content:space-between; font-size:7px; color:rgba(200,160,50,0.3); margin-top:2px; }
#playback-info { font-size:8px; color:rgba(200,160,50,0.4); letter-spacing:0.1em; }
#speed-display { font-size:9px; color:rgba(100,200,255,0.5); letter-spacing:0.15em; }

/* Right: Camera info */
#cam-display { width:200px; border-left:1px solid rgba(200,160,50,0.12); padding:10px 12px; flex-shrink:0; }
#cam-display-title { font-size:8px; letter-spacing:0.25em; color:rgba(200,160,50,0.4); margin-bottom:8px; }
.cdval { display:flex; justify-content:space-between; margin:5px 0; font-size:10px; }
.cdval span:first-child { color:rgba(200,160,50,0.35); font-size:8px; }
.cdval span:last-child { color:#c9a832; }
#compass { width:60px; height:60px; margin:6px auto 0; position:relative; }
#compass svg { width:100%; height:100%; }

/* ══ EDITOR MODAL ══ */
#editor {
  display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#04040e; border:1px solid rgba(200,160,50,0.35); padding:16px;
  z-index:2000; width:340px;
}
#editor h3 { font-size:9px; letter-spacing:0.3em; color:rgba(200,160,50,0.5); margin-bottom:12px; }
.ef { margin-bottom:9px; }
.ef label { font-size:7px; color:rgba(200,160,50,0.4); display:block; margin-bottom:3px; letter-spacing:0.1em; }
.ef input, .ef select { width:100%; padding:6px 8px; background:rgba(200,160,50,0.05);
  border:1px solid rgba(200,160,50,0.2); color:#c9a832; font:10px 'Courier New',monospace; }
.ef input[type=range] { padding:3px 0; border:none; background:none; accent-color:#c9a832; cursor:pointer; }
.rval { float:right; color:#c9a832; font-size:10px; }
.ef-row { display:flex; gap:6px; margin-top:10px; }
.ef-row .rb { flex:1; }
.cam-hint { background:rgba(100,200,255,0.05); border:1px solid rgba(100,200,255,0.15);
  padding:7px 9px; font-size:8px; color:rgba(100,200,255,0.55); letter-spacing:0.07em;
  line-height:1.9; margin-bottom:10px; }

/* ══ EXPORT ══ */
#export-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:3000;
  align-items:center; justify-content:center;
}
#export-overlay.open { display:flex; }
#export-box { background:#04040e; border:1px solid rgba(200,160,50,0.3); padding:16px;
  width:620px; max-height:80vh; display:flex; flex-direction:column; gap:10px; }
#export-box h3 { font-size:9px; letter-spacing:0.3em; color:#c9a832; }
#export-text { flex:1; overflow-y:auto; white-space:pre; font-size:8px; line-height:1.6;
  color:rgba(200,160,50,0.7); background:rgba(200,160,50,0.03);
  border:1px solid rgba(200,160,50,0.1); padding:10px; }
</style>
</head>
<body>
<div id="app">
  <div id="top">

    <!-- 2D MAP -->
    <div id="map-wrap">
      <div id="map"></div>
      <!-- CESIUM PREVIEW -->
      <div id="cesium-wrap">
        <div id="cesiumContainer"></div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div id="rpanel">
      <div id="rp-header">
        <h1>KAIT · FLIGHT PLANNER</h1>
      </div>
      <div id="rp-tabs">
        <button class="rtab" id="tab-wp" onclick="setRTab('wp')">WAYPOINTS</button>
        <button class="rtab on" id="tab-lm" onclick="setRTab('lm')">LANDMARKS</button>
      </div>
      <div id="wp-list" style="display:none"></div>
      <div id="lm-list" style="flex:1;overflow-y:auto;font-size:9px;"></div>
      <div id="rp-stats">0 waypoints</div>
      <div id="rp-btns">
        <!-- MAP LAYER -->
        <div class="rb-row">
          <button class="rb" id="lm-toggle-btn" onclick="toggleLandmarks()">★ HIDE LANDMARKS</button>
          <button class="rb bl" onclick="openCesium(-1)">▶ TEST PATH</button>
        </div>
        <!-- PATH EDIT -->
        <div style="font-size:7px;letter-spacing:0.2em;color:rgba(200,160,50,0.3);padding:3px 0 2px">PATH TOOLS</div>
        <div class="rb-row">
          <button class="rb" id="tool-lookat" onclick="toggleLookAt()">🎯 LOOK-AT</button>
          <button class="rb" onclick="snapAll()">⊞ SNAP STREETS</button>
        </div>
        <div class="rb-row">
          <button class="rb" onclick="smoothPath()">〜 SMOOTH</button>
          <button class="rb" onclick="reversePath()">⇄ REVERSE</button>
        </div>
        <div class="rb-row">
          <button class="rb" onclick="toggleProfiler()">↗ ALT PROFILE</button>
          <button class="rb" onclick="showTimeCalc()">⏱ TIME CALC</button>
        </div>
        <!-- IMPORT/EXPORT -->
        <div style="font-size:7px;letter-spacing:0.2em;color:rgba(200,160,50,0.3);padding:3px 0 2px">IMPORT / EXPORT</div>
        <div class="rb-row">
          <button class="rb" onclick="showImport()">⬆ IMPORT WP</button>
          <button class="rb gn" onclick="doExport()">⬇ EXPORT JS</button>
        </div>
        <!-- HISTORY -->
        <div class="rb-row">
          <button class="rb" onclick="undoLast()" style="border-color:rgba(255,160,50,0.25);color:rgba(255,160,50,0.7)">↩ UNDO LAST</button>
          <button class="rb" onclick="clearAll()" style="border-color:rgba(255,80,80,0.2);color:rgba(255,100,100,0.6)">✕ DISCARD ALL</button>
        </div>
